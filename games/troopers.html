<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="Space Troopers — Blast through waves of alien invaders in Space Arcade!">
  <title>Space Troopers — Space Arcade</title>
  <link rel="icon" type="image/svg+xml" href="../assets/spaceship.svg">
  <link rel="stylesheet" href="../css/style.css">
</head>
<body>

  <div id="starfield"></div>

  <a href="../index.html" class="back-btn" id="back-btn">← Arcade</a>

  <div class="page-content game-page">
    <div class="game-header">
      <h1>Space Troopers</h1>
    </div>
    <div class="game-hud">
      <div>Score: <span class="value" id="score">0</span></div>
      <div>Wave: <span class="value" id="wave">1</span></div>
      <div>Lives: <span class="value" id="lives">♥♥♥</span></div>
    </div>
    <div class="game-canvas-wrap">
      <canvas id="game-canvas" width="500" height="600"></canvas>
    </div>
    <p class="game-controls-hint">
      Use <kbd>←</kbd> <kbd>→</kbd> to move · <kbd>Space</kbd> to fire 🔫
    </p>
  </div>

  <!-- Start Overlay -->
  <div class="game-overlay" id="start-overlay">
    <div class="overlay-title">Space Troopers</div>
    <p class="overlay-score">Defend the galaxy from alien invaders! 👾</p>
    <div class="overlay-buttons">
      <button class="btn btn-primary" id="start-btn">Start Mission</button>
    </div>
  </div>

  <!-- Game Over Overlay -->
  <div class="game-overlay hidden" id="gameover-overlay">
    <div class="overlay-title">Mission Failed</div>
    <p class="overlay-score" id="gameover-text">Score: <span class="highlight">0</span></p>
    <div class="overlay-buttons">
      <button class="btn btn-primary" id="retry-btn">Try Again</button>
      <a href="../index.html" class="btn btn-secondary">Back to Arcade</a>
    </div>
  </div>

  <!-- Wave Clear Overlay -->
  <div class="game-overlay hidden" id="wave-overlay">
    <div class="overlay-title" id="wave-title">Wave 1 Clear!</div>
    <p class="overlay-score">Get ready for the next wave…</p>
  </div>

  <!-- Lightsaber Volume UI -->
  <div id="lightsaber-volume">
    <div class="hilt-btn"></div>
    <div class="blade-container">
      <div class="blade-glow"></div>
      <input type="range" min="0" max="1" step="0.01" value="0.5" class="volume-slider">
    </div>
  </div>

  <script src="../js/stars.js"></script>
  <script src="../js/cursor.js"></script>
  <script src="../js/audio.js"></script>
  <script src="../js/volume.js"></script>
  <script src="troopers.js"></script>

</body>
</html>
