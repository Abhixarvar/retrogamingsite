<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="Space Arcade — Play retro games like Snake, Pac-Man, and Space Troopers in a cosmic space adventure!">
  <title>Space Arcade — Retro Games</title>
  <link rel="icon" type="image/svg+xml" href="assets/spaceship.svg">
  <link rel="stylesheet" href="css/style.css?v=2">
</head>
<body>

  <!-- Starfield Background -->
  <div id="starfield"></div>

  <!-- Page Content -->
  <div class="page-content">

    <!-- Synthwave Background Elements -->
    <div class="synthwave-bg">
      <div class="synth-sun"></div>
      <div class="synth-grid"></div>
      <!-- UFOs -->
      <div class="ufo ufo-1">🛸</div>
      <div class="ufo ufo-2">🚀</div>
      <div class="ufo ufo-3">🛰️</div>
    </div>

    <!-- Hero Section -->
    <header class="hero synth-hero">
      <h1 class="hero-title synth-title">GAME</h1>
      <p class="hero-subtitle synth-subtitle">@spacearcade</p>
    </header>

    <!-- Main Navigation Menu -->
    <section class="synth-nav">
      <a href="singleplayer.html" class="synth-btn">🕹️ Single Player Missions</a>
      <a href="party.html" target="_blank" class="synth-btn synth-btn-glow">🌐 Online Party Lounge</a>
      <a href="offline.html" class="synth-btn">🛋️ Local Multiplayer</a>
    </section>

    <!-- Cross-Promotion Section -->
    <section class="promo-section">
      <h2 class="promo-title">Partner Networks</h2>
      <div class="promo-grid">
        <a href="https://gamerecommendation-ai-nxyt.vercel.app/" target="_blank" class="promo-card">
          <div class="promo-icon">🤖</div>
          <h3>Game Recommendation AI</h3>
          <p>Discover your next favorite game with our intelligent AI recommender.</p>
        </a>
        <a href="https://phopee.vercel.app/" target="_blank" class="promo-card">
          <div class="promo-icon">📱</div>
          <h3>Phopee</h3>
          <p>Find the perfect smartphone tailored to your needs and budget.</p>
        </a>
      </div>
    </section>

  </div>

  <!-- Lightsaber Volume UI -->
  <div id="lightsaber-volume">
    <div class="hilt-btn"></div>
    <div class="blade-container">
      <div class="blade-glow"></div>
      <input type="range" min="0" max="1" step="0.01" value="0.5" class="volume-slider">
    </div>
  </div>

  <!-- Scripts -->
  <script src="js/stars.js"></script>
  <script src="js/cursor.js"></script>
  <script src="js/audio.js"></script>
  <script src="js/volume.js"></script>
  <script src="js/previews.js"></script>

</body>
</html>
