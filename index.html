<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="Space Arcade — Play retro games like Snake, Pac-Man, and Space Troopers in a cosmic space adventure!">
  <title>Space Arcade — Retro Games</title>
  <link rel="icon" type="image/svg+xml" href="assets/spaceship.svg">
  <link rel="stylesheet" href="css/style.css?v=3">
</head>
<body>

  <!-- Starfield Background -->
  <div id="starfield"></div>

  <!-- Page Content -->
  <div class="page-content">

    <!-- Astral Background Elements -->
    <div class="astral-bg">
      <div class="astral-planet"></div>
      <div class="astral-sun"></div>
      <div class="astral-sun-halo"></div>
      <div class="astral-grid-bottom"></div>
      <div class="astral-grid-top"></div>
      
      <!-- Sleek Spaceship SVG -->
      <svg class="astral-ship" viewBox="0 0 100 100" xmlns="http://www.w3.org/2000/svg">
        <path d="M50 10 L80 60 L60 60 L50 80 L40 60 L20 60 Z" fill="#09001b" stroke="#ff007f" stroke-width="2"/>
        <circle cx="45" cy="55" r="3" fill="#00f0ff" filter="drop-shadow(0 0 4px #00f0ff)"/>
        <circle cx="55" cy="55" r="3" fill="#00f0ff" filter="drop-shadow(0 0 4px #00f0ff)"/>
      </svg>
    </div>

    <!-- Hero Section -->
    <header class="hero synth-hero" style="margin-top: 5vh; margin-bottom: 2rem;">
      <h1 class="hero-title synth-title" style="font-size: 5rem; letter-spacing: 10px;">SPACE ARCADE</h1>
    </header>

    <!-- Main Navigation Menu -->
    <section class="synth-nav">
      <a href="singleplayer.html" class="synth-btn">Single Player Missions</a>
      <a href="party.html" target="_blank" class="synth-btn synth-btn-glow">Online Party Lounge</a>
      <a href="offline.html" class="synth-btn">Local Multiplayer</a>
    </section>

    <!-- Cross-Promotion Section -->
    <section class="promo-section">
      <h2 class="promo-title">Partner Networks</h2>
      <div class="promo-grid">
        <a href="https://gamerecommendation-ai-nxyt.vercel.app/" target="_blank" class="promo-card">
          <div class="promo-icon">AI</div>
          <h3>Game Recommendation AI</h3>
          <p>Discover your next favorite game with our intelligent AI recommender.</p>
        </a>
        <a href="https://phopee.vercel.app/" target="_blank" class="promo-card">
          <div class="promo-icon">Mobile</div>
          <h3>Phopee</h3>
          <p>Find the perfect smartphone tailored to your needs and budget.</p>
        </a>
      </div>
    </section>

  </div>

  <!-- Lightsaber Volume UI -->
  <div id="lightsaber-volume">
    <div class="hilt-btn"></div>
    <div class="blade-container">
      <div class="blade-glow"></div>
      <input type="range" min="0" max="1" step="0.01" value="0.5" class="volume-slider">
    </div>
  </div>

  <!-- Scripts -->
  <script src="js/stars.js"></script>
  <script src="js/cursor.js"></script>
  <script src="js/audio.js"></script>
  <script src="js/volume.js"></script>
  <script src="js/previews.js"></script>

</body>
</html>
