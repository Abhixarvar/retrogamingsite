<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="Space Arcade — Play retro games like Snake, Pac-Man, and Space Troopers in a cosmic space adventure!">
  <title>Space Arcade — Retro Games</title>
  <link rel="icon" type="image/svg+xml" href="assets/spaceship.svg">
  <link rel="stylesheet" href="css/style.css?v=3">
</head>
<body>

  <!-- Starfield Background -->
  <div id="starfield"></div>

  <!-- Page Content -->
  <div class="page-content">

    <!-- Astral Background Elements -->
    <div class="astral-bg">
      <div class="astral-planet"></div>
      <div class="astral-sun"></div>
      <div class="astral-sun-halo"></div>
      <div class="astral-grid-bottom"></div>
      <div class="astral-grid-top"></div>
      
      <!-- Cyberpunk Core SVG -->
      <svg class="astral-ship" viewBox="0 0 200 200" xmlns="http://www.w3.org/2000/svg">
        <defs>
          <radialGradient id="coreGlow" cx="50%" cy="50%" r="50%">
            <stop offset="0%" stop-color="#00f0ff" stop-opacity="1"/>
            <stop offset="50%" stop-color="#7000ff" stop-opacity="0.8"/>
            <stop offset="100%" stop-color="#1a0033" stop-opacity="0"/>
          </radialGradient>
        </defs>
        <circle cx="100" cy="100" r="80" fill="none" stroke="#00f0ff" stroke-width="4" stroke-dasharray="10 20 40 10">
          <animateTransform attributeName="transform" type="rotate" from="0 100 100" to="360 100 100" dur="20s" repeatCount="indefinite" />
        </circle>
        <circle cx="100" cy="100" r="60" fill="none" stroke="#ff007f" stroke-width="6" stroke-dasharray="30 15">
          <animateTransform attributeName="transform" type="rotate" from="360 100 100" to="0 100 100" dur="15s" repeatCount="indefinite" />
        </circle>
        <polygon points="100,30 160,70 160,130 100,170 40,130 40,70" fill="#050014" stroke="#00f0ff" stroke-width="3"/>
        <polygon points="100,45 145,75 145,125 100,155 55,125 55,75" fill="url(#coreGlow)" opacity="0.8"/>
        <!-- Thrust beams -->
        <g transform="rotate(-30 100 100)">
          <rect x="90" y="-100" width="20" height="150" fill="url(#coreGlow)" opacity="0.8" />
          <line x1="100" y1="-150" x2="100" y2="50" stroke="#00f0ff" stroke-width="8" opacity="0.8">
             <animate attributeName="opacity" values="0.4;1;0.4" dur="0.5s" repeatCount="indefinite" />
          </line>
          <line x1="80" y1="-120" x2="80" y2="40" stroke="#ff007f" stroke-width="4" opacity="0.6" />
          <line x1="120" y1="-130" x2="120" y2="60" stroke="#7000ff" stroke-width="5" opacity="0.7" />
        </g>
      </svg>
    </div>

    <!-- Hero Section -->
    <header class="hero synth-hero">
      <h1 class="hero-title synth-title">SPACE ARCADE</h1>
    </header>

    <!-- Main Navigation Menu -->
    <section class="synth-nav">
      <a href="singleplayer.html" class="synth-btn">Single Player Missions</a>
      <a href="party.html" target="_blank" class="synth-btn synth-btn-glow">Online Party Lounge</a>
      <a href="offline.html" class="synth-btn">Local Multiplayer</a>
    </section>

    <!-- Cross-Promotion Section -->
    <section class="promo-section">
      <h2 class="promo-title">Partner Networks</h2>
      <div class="promo-grid">
        <a href="https://gamerecommendation-ai-nxyt.vercel.app/" target="_blank" class="promo-card">
          <div class="promo-icon">AI</div>
          <h3>Game Recommendation AI</h3>
          <p>Discover your next favorite game with our intelligent AI recommender.</p>
        </a>
        <a href="https://phopee.vercel.app/" target="_blank" class="promo-card">
          <div class="promo-icon">Mobile</div>
          <h3>Phopee</h3>
          <p>Find the perfect smartphone tailored to your needs and budget.</p>
        </a>
      </div>
    </section>

  </div>

  <!-- Lightsaber Volume UI -->
  <div id="lightsaber-volume">
    <div class="hilt-btn"></div>
    <div class="blade-container">
      <div class="blade-glow"></div>
      <input type="range" min="0" max="1" step="0.01" value="0.5" class="volume-slider">
    </div>
  </div>

  <!-- Scripts -->
  <script src="js/stars.js"></script>
  <script src="js/cursor.js"></script>
  <script src="js/audio.js"></script>
  <script src="js/volume.js"></script>
  <script src="js/previews.js"></script>

</body>
</html>
