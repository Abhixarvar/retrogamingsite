<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="Space Arcade — Play retro games like Snake, Pac-Man, and Space Troopers in a cosmic space adventure!">
  <title>Space Arcade — Retro Games</title>
  <link rel="icon" type="image/svg+xml" href="assets/spaceship.svg">
  <link rel="stylesheet" href="css/style.css?v=5">
</head>
<body class="no-scroll">

  <!-- Starfield Background -->
  <div id="starfield"></div>

  <!-- Page Content -->
  <div class="page-content home-page">

    <!-- Header Banner -->
    <header class="arcade-header">
      <h1 class="arcade-logo">SPACE ARCADE</h1>
    </header>

    <!-- Main Navigation Menu -->
    <section class="synth-nav">
      <a href="singleplayer.html" class="synth-btn" data-tip="🎮 Play awesome games all by yourself!"><span class="btn-scanline"></span>SINGLEPLAYER GAMES</a>
      <a href="party.html" target="_blank" class="synth-btn" data-tip="🎉 Play with friends online in real time!"><span class="btn-scanline"></span>ONLINE PARTY LOUNGE</a>
      <a href="offline.html" class="synth-btn" data-tip="👫 Share the keyboard and play with a friend next to you!"><span class="btn-scanline"></span>LOCAL MULTIPLAYER</a>
      <a href="#promo-section" class="synth-btn" data-tip="🌟 Check out other cool stuff we made!"><span class="btn-scanline"></span>MORE FROM US</a>
    </section>

    <!-- Ad-style Partner Banner -->
    <div class="promo-banner" id="promo-section">
      <span class="promo-banner-label">✨ FROM US</span>
      <a href="https://gamerecommendation-ai-nxyt.vercel.app/" target="_blank" class="promo-banner-link" data-tip="🤖 Let AI pick your next favorite game!">
        🎯 Game Recommendation AI
      </a>
      <span class="promo-banner-sep">|</span>
      <a href="https://phopee.vercel.app/" target="_blank" class="promo-banner-link" data-tip="📱 Find the perfect phone for you!">
        📱 Phopee
      </a>
    </div>

  </div>

  <!-- Lightsaber Volume UI -->
  <div id="lightsaber-volume">
    <div class="hilt-btn"></div>
    <div class="blade-container">
      <div class="blade-glow"></div>
      <input type="range" min="0" max="1" step="0.01" value="0.5" class="volume-slider">
    </div>
  </div>

  <!-- Scripts -->
  <script src="js/stars.js"></script>
  <script src="js/cursor.js"></script>
  <script src="js/audio.js"></script>
  <script src="js/volume.js"></script>
  <script src="js/previews.js"></script>
  <script src="js/tooltips.js"></script>

</body>
</html>
