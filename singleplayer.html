<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="Space Arcade — Play retro games like Snake, Pac-Man, and Space Troopers in a cosmic space adventure!">
  <title>Space Arcade — Single Player</title>
  <link rel="icon" type="image/svg+xml" href="assets/spaceship.svg">
  <link rel="stylesheet" href="css/style.css?v=5">
</head>
<body class="no-scroll">

  <!-- Starfield Background -->
  <div id="starfield"></div>

  <!-- Page Content -->
  <div class="page-content compact-page">

    <!-- Header Banner -->
    <header class="arcade-header">
      <a href="index.html" class="arcade-logo-link">
        <h1 class="arcade-logo small">SPACE ARCADE</h1>
      </a>
      <p class="arcade-subtitle">SINGLEPLAYER MISSIONS</p>
    </header>

    <!-- Game Cards Grid -->
    <section class="games-grid compact-grid" id="games-grid">

      <!-- Snake -->
      <a href="games/snake.html" target="_blank" class="game-card thumb-card" data-game="snake" id="card-snake" data-tip="🐍 Guide your space worm and collect stars! Use arrow keys to move.">
        <div class="thumb-wrap">
          <canvas class="card-preview" id="preview-snake" width="280" height="150"></canvas>
          <h2 class="thumb-title">Space Worm</h2>
        </div>
        <span class="card-play-btn">Launch Mission</span>
      </a>

      <!-- Pac-Man -->
      <a href="games/pacman.html" target="_blank" class="game-card thumb-card" data-game="pacman" id="card-pacman" data-tip="👻 Eat all the dots and run from ghosts! Use arrow keys to move.">
        <div class="thumb-wrap">
          <canvas class="card-preview" id="preview-pacman" width="280" height="150"></canvas>
          <h2 class="thumb-title">Pac-Man</h2>
        </div>
        <span class="card-play-btn">Launch Mission</span>
      </a>

      <!-- Space Troopers -->
      <a href="games/troopers.html" target="_blank" class="game-card thumb-card" data-game="troopers" id="card-troopers" data-tip="👾 Shoot the aliens before they reach you! Use arrows to move, Space to fire.">
        <div class="thumb-wrap">
          <canvas class="card-preview" id="preview-troopers" width="280" height="150"></canvas>
          <h2 class="thumb-title">Space Troopers</h2>
        </div>
        <span class="card-play-btn">Launch Mission</span>
      </a>

      <!-- Tetris -->
      <a href="games/tetris.html" target="_blank" class="game-card thumb-card" data-game="tetris" id="card-tetris" data-tip="🧱 Stack the blocks and clear lines! Use arrows to move, Up to rotate.">
        <div class="thumb-wrap">
          <canvas class="card-preview" id="preview-tetris" width="280" height="150"></canvas>
          <h2 class="thumb-title">Cosmic Blocks</h2>
        </div>
        <span class="card-play-btn">Launch Mission</span>
      </a>

      <!-- Block Blast -->
      <a href="games/blockblast.html" target="_blank" class="game-card thumb-card" data-game="blockblast" id="card-blockblast" data-tip="💥 Place blocks, clear lines, earn stars! Drag & drop or use keyboard.">
        <div class="thumb-wrap">
          <canvas class="card-preview" id="preview-blockblast" width="280" height="150"></canvas>
          <h2 class="thumb-title">Block Blast</h2>
        </div>
        <span class="card-play-btn">Launch Mission</span>
      </a>

    </section>

  </div>

  <!-- Lightsaber Volume UI -->
  <div id="lightsaber-volume">
    <div class="hilt-btn"></div>
    <div class="blade-container">
      <div class="blade-glow"></div>
      <input type="range" min="0" max="1" step="0.01" value="0.5" class="volume-slider">
    </div>
  </div>

  <!-- Scripts -->
  <script src="js/stars.js"></script>
  <script src="js/cursor.js"></script>
  <script src="js/audio.js"></script>
  <script src="js/volume.js"></script>
  <script src="js/previews.js"></script>
  <script src="js/tooltips.js"></script>

</body>
</html>
